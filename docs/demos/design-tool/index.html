<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Rendero — Design Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #101014;
            --panel: #18181c;
            --panel-border: #27272e;
            --toolbar: #131316;
            --accent: #5b8af5;
            --accent-hover: #7ba3ff;
            --accent-dim: rgba(91,138,245,0.12);
            --text: #c8c8d0;
            --text-dim: #6e6e7a;
            --text-bright: #eeeeef;
            --danger: #e05555;
            --success: #4eca7a;
            --surface: #1f1f25;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            touch-action: none;
        }

        /* ─── App Layout ─── */
        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ─── Toolbar ─── */
        #toolbar {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 0 12px;
            background: var(--toolbar);
            border-bottom: 1px solid var(--panel-border);
            height: 44px;
            flex-shrink: 0;
            z-index: 10;
        }
        .tool-group {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 0 6px;
        }
        .tool-group + .tool-group { border-left: 1px solid var(--panel-border); padding-left: 12px; margin-left: 6px; }
        .tool-btn {
            padding: 6px 10px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-dim);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'DM Sans', system-ui;
            font-weight: 500;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .tool-btn:hover { background: var(--accent-dim); color: var(--text); border-color: var(--panel-border); }
        .tool-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .tool-btn.danger:hover { background: rgba(224,85,85,0.12); color: var(--danger); }
        #info {
            margin-left: auto;
            font-size: 11px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-dim);
            letter-spacing: -0.3px;
        }
        #info b { color: var(--accent); font-weight: 500; }

        /* ─── Workspace ─── */
        #workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ─── Panels ─── */
        .panel {
            width: 232px;
            background: var(--panel);
            border-right: 1px solid var(--panel-border);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-right {
            border-right: none;
            border-left: 1px solid var(--panel-border);
        }
        .panel-header {
            padding: 10px 14px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-dim);
            border-bottom: 1px solid var(--panel-border);
            user-select: none;
        }

        /* ─── Page Tabs ─── */
        #page-tabs {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 4px 8px;
            border-bottom: 1px solid var(--panel-border);
            flex-shrink: 0;
            overflow-x: auto;
            min-height: 32px;
        }
        .page-tab {
            padding: 4px 10px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 5px;
            white-space: nowrap;
            color: var(--text-dim);
            user-select: none;
            transition: all 0.12s;
        }
        .page-tab:hover { background: var(--surface); color: var(--text); }
        .page-tab.active { background: var(--accent); color: #fff; }
        .page-tab-add {
            padding: 4px 8px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
            color: var(--text-dim);
            line-height: 1;
            user-select: none;
            transition: all 0.12s;
        }
        .page-tab-add:hover { background: var(--surface); color: var(--text); }

        /* ─── Layers ─── */
        #layers-list {
            flex: 1;
            overflow-y: auto;
        }
        #layers-list::-webkit-scrollbar { width: 4px; }
        #layers-list::-webkit-scrollbar-track { background: transparent; }
        #layers-list::-webkit-scrollbar-thumb { background: var(--panel-border); border-radius: 2px; }
        .layer-item {
            padding: 5px 14px;
            font-size: 12px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: background 0.1s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .layer-item:hover { background: var(--surface); }
        .layer-item.selected { background: var(--accent); color: #fff; }
        .layer-icon { font-size: 10px; opacity: 0.5; width: 14px; text-align: center; }

        /* ─── Properties ─── */
        #properties-content {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }
        .prop-group {
            padding: 10px 14px;
            border-bottom: 1px solid var(--panel-border);
        }
        .prop-group-title {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }
        .prop-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .prop-label {
            font-size: 11px;
            color: var(--text-dim);
            width: 20px;
            flex-shrink: 0;
        }
        .prop-input {
            background: var(--bg);
            border: 1px solid var(--panel-border);
            color: var(--text);
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 12px;
            font-family: 'JetBrains Mono', monospace;
            width: 100%;
            outline: none;
            transition: border-color 0.15s;
        }
        .prop-input:focus { border-color: var(--accent); }
        .prop-swatch {
            width: 24px;
            height: 24px;
            border-radius: 5px;
            border: 1px solid var(--panel-border);
            cursor: pointer;
            flex-shrink: 0;
        }
        .prop-info {
            font-size: 11px;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
        }

        /* ─── Canvas ─── */
        #canvas-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: var(--bg);
        }
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: default;
        }

        /* ─── Hidden inputs ─── */
        .hidden-input { display: none; }

        /* ─── Context Menu ─── */
        #ctx-menu {
            display: none;
            position: fixed;
            z-index: 1000;
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 4px 0;
            min-width: 180px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            font-size: 13px;
        }
        .ctx-item {
            padding: 6px 14px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            transition: background 0.1s;
        }
        .ctx-item:hover { background: var(--accent-dim); }
        .ctx-item.disabled { opacity: 0.35; pointer-events: none; }
        .ctx-shortcut { color: var(--text-dim); font-size: 11px; font-family: 'JetBrains Mono', monospace; }
        .ctx-sep { height: 1px; background: var(--panel-border); margin: 4px 0; }

        /* ─── Loading overlay ─── */
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 100;
        }
        #loading span {
            font-size: 14px;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
        }

        @media (max-width: 640px) {
            .panel { display: none; }
            #toolbar { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
            #toolbar::-webkit-scrollbar { display: none; }
            .tool-btn { font-size: 11px; padding: 5px 8px; }
            #info { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div id="loading"><span>Initializing engine...</span></div>
    <div id="app">
        <div id="toolbar">
            <div class="tool-group">
                <button class="tool-btn active" data-tool="select">V Select</button>
                <button class="tool-btn" data-tool="frame">F Frame</button>
                <button class="tool-btn" data-tool="rect">R Rect</button>
                <button class="tool-btn" data-tool="ellipse">O Ellipse</button>
                <button class="tool-btn" data-tool="text">T Text</button>
                <button class="tool-btn" data-tool="pen">P Pen</button>
            </div>
            <div class="tool-group">
                <button class="tool-btn danger" id="btn-delete">Delete</button>
            </div>
            <div class="tool-group">
                <button class="tool-btn" id="btn-export-png">PNG</button>
                <button class="tool-btn" id="btn-export-svg">SVG</button>
                <button class="tool-btn" id="btn-import">Import .fig</button>
            </div>
            <input type="file" id="fig-input" class="hidden-input" accept=".fig,.json">
            <span id="info">loading...</span>
        </div>
        <div id="workspace">
            <div class="panel panel-left">
                <div id="page-tabs"></div>
                <div class="panel-header">Layers</div>
                <div id="layers-list"></div>
            </div>
            <div id="canvas-wrap">
                <canvas id="canvas"></canvas>
            </div>
            <div class="panel panel-right">
                <div class="panel-header">Properties</div>
                <div id="properties-content">
                    <div class="prop-group">
                        <div class="prop-info" style="padding: 8px 0; text-align: center;">No selection</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="ctx-menu"></div>
    <script type="module" src="main.js"></script>
</body>
</html>
