<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Rendero — WASM Canvas Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: #050507; overflow: hidden; width: 100%; height: 100%; touch-action: none; -webkit-overflow-scrolling: none; }

        #canvas-gl, #canvas-2d {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
        }
        #canvas-gl { z-index: 1; pointer-events: none; }
        #canvas-2d { z-index: 2; cursor: grab; }
        #canvas-2d:active { cursor: grabbing; }

        /* Floating nav */
        #nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; display: flex; gap: 2px;
            background: rgba(8,8,14,0.85);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px; padding: 5px 6px;
            backdrop-filter: blur(16px);
            opacity: 0; transition: opacity 0.6s ease;
        }
        #nav.visible { opacity: 1; }
        .nav-btn {
            display: flex; align-items: center; gap: 5px;
            padding: 6px 14px; border: none; background: transparent;
            color: rgba(255,255,255,0.35); font-family: 'Space Mono', monospace;
            font-size: 10px; cursor: pointer; border-radius: 20px;
            transition: all 0.2s; white-space: nowrap;
        }
        .nav-btn:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.04); }
        .nav-btn.active { color: #4ae0ff; background: rgba(74,224,255,0.08); }
        .nav-dot {
            width: 5px; height: 5px; border-radius: 50%;
            background: currentColor; flex-shrink: 0;
        }

        /* FPS badge */
        #fps-badge {
            position: fixed; top: 14px; right: 16px; z-index: 100;
            font-family: 'Space Mono', monospace; font-size: 10px;
            color: rgba(255,255,255,0.25); pointer-events: none;
        }
        #fps-badge b { color: #4ade80; font-weight: 400; }

        /* Zoom hint */
        #zoom-badge {
            position: fixed; top: 14px; left: 16px; z-index: 100;
            font-family: 'Space Mono', monospace; font-size: 10px;
            color: rgba(255,255,255,0.2); pointer-events: none;
        }

        /* Mobile nav */
        @media (max-width: 640px) {
            #nav {
                max-width: calc(100vw - 24px);
                overflow-x: auto; overflow-y: hidden;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
                bottom: 12px; padding: 4px 5px;
                border-radius: 20px;
            }
            #nav::-webkit-scrollbar { display: none; }
            .nav-btn { padding: 5px 10px; font-size: 9px; }
            .nav-dot { width: 4px; height: 4px; }
            #fps-badge { font-size: 9px; top: 10px; right: 10px; }
            #zoom-badge { font-size: 9px; top: 10px; left: 10px; }
        }

        /* Noise grain */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 9999;
            pointer-events: none; opacity: 0.015;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
        }
    </style>
</head>
<body>
    <canvas id="canvas-gl"></canvas>
    <canvas id="canvas-2d"></canvas>

    <div id="nav">
        <button class="nav-btn active" data-island="home"><span class="nav-dot"></span>Home</button>
        <button class="nav-btn" data-island="earthquake"><span class="nav-dot"></span>Earthquake</button>
        <button class="nav-btn" data-island="neural"><span class="nav-dot"></span>Neural Net</button>
        <button class="nav-btn" data-island="splat"><span class="nav-dot"></span>Splats</button>
        <button class="nav-btn" data-island="genome"><span class="nav-dot"></span>Genome</button>
        <button class="nav-btn" data-island="design"><span class="nav-dot"></span>Design</button>
        <button class="nav-btn" data-island="code"><span class="nav-dot"></span>Code</button>
    </div>

    <span id="fps-badge"><b id="fps-val">0</b> fps · <span id="pts-val">0</span> pts</span>
    <span id="zoom-badge" id="zoom-val"></span>

    <script type="module" src="main.js?v=29"></script>
</body>
</html>
